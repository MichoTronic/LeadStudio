<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <?!= include('Styles'); ?>
  </head>
  <body>
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>

    <header class="topbar">
      <div class="topbar-brand">
        <div class="brand-mark">TT</div>
        <div class="brand-copy">
          <p class="brand-overline">Timeless Tech</p>
          <p class="brand-title">Lead Studio</p>
        </div>
      </div>
      <div class="topbar-user">
        <span class="user-label">Authorized User</span>
        <strong id="viewer-email" class="user-value">Loading...</strong>
      </div>
    </header>

    <main class="shell">
      <section class="workspace">
        <aside class="rail">
          <div class="panel">
            <p class="panel-kicker">Actions</p>
            <button id="refresh-button" class="primary-button" type="button">Refresh Leads</button>
          </div>

          <div class="panel status-panel">
            <p class="panel-kicker">Status</p>
            <p id="status-text" class="status-text">Loading app...</p>
          </div>
        </aside>

        <section class="main-panel">
          <div class="panel table-panel">
            <div class="table-toolbar">
              <div class="toolbar-actions">
                <div class="metric-row">
                  <button class="rows-inline metric-button" type="button" data-status-filter="">
                    <span class="rows-inline-label">Contacts</span>
                    <strong id="row-count" class="rows-inline-value">0</strong>
                  </button>
                  <button class="rows-inline metric-inline metric-new-lead metric-button" type="button" data-status-filter="New Lead">
                    <span class="rows-inline-label">New Lead</span>
                    <strong id="new-lead-count" class="rows-inline-value">0</strong>
                  </button>
                  <button class="rows-inline metric-inline metric-button metric-qualified" type="button" data-status-filter="Qualified Leads">
                    <span class="rows-inline-label">Qualified Leads</span>
                    <strong id="qualified-count" class="rows-inline-value">0</strong>
                  </button>
                  <button class="rows-inline metric-inline metric-button metric-active" type="button" data-status-filter="Active">
                    <span class="rows-inline-label">Active</span>
                    <strong id="active-count" class="rows-inline-value">0</strong>
                  </button>
                  <button class="rows-inline metric-inline metric-button metric-inactive" type="button" data-status-filter="Not Active">
                    <span class="rows-inline-label">Not Active</span>
                    <strong id="inactive-count" class="rows-inline-value">0</strong>
                  </button>
                  <button class="rows-inline metric-inline metric-button metric-onboarding" type="button" data-status-filter="Onboarding">
                    <span class="rows-inline-label">Onboarding</span>
                    <strong id="onboarding-complete-count" class="rows-inline-value">0</strong>
                  </button>
                </div>
                <div class="date-filter-row">
                  <button class="date-filter-button" type="button" data-date-preset="7">Last 7 days</button>
                  <button class="date-filter-button" type="button" data-date-preset="30">Last 30 days</button>
                  <div class="date-custom-group">
                    <span class="date-custom-label">Custom</span>
                    <input id="date-from-input" class="date-input" type="date" aria-label="Date from">
                    <input id="date-to-input" class="date-input" type="date" aria-label="Date to">
                  </div>
                </div>
              </div>
              <div class="toolbar-controls">
                <div class="toolbar-filter-row">
                  <button id="clear-filters-button" class="clear-filters-button" type="button">Clear filters</button>
                  <details id="business-filter-menu" class="filter-menu">
                    <summary id="business-filter-summary">Business Type</summary>
                    <div id="business-filter-options" class="filter-options"></div>
                  </details>
                  <details id="target-region-filter-menu" class="filter-menu filter-menu-compact">
                    <summary id="target-region-filter-summary">Target Region</summary>
                    <div id="target-region-filter-options" class="filter-options"></div>
                  </details>
                  <details id="interested-filter-menu" class="filter-menu">
                    <summary id="interested-filter-summary">Interested in</summary>
                    <div id="interested-filter-options" class="filter-options"></div>
                  </details>
                </div>
                <div class="toolbar-utility-row">
                  <input id="search-input" class="search-input search-input-large" type="search" placeholder="Search subject, contact, company, business type...">
                  <details id="export-menu" class="export-menu">
                    <summary>Export</summary>
                    <div class="export-options">
                      <button id="export-csv-button" class="export-option-button" type="button">Download CSV</button>
                      <button id="export-xlsx-button" class="export-option-button" type="button">Download XLSX</button>
                    </div>
                  </details>
                  <button id="settings-button" class="icon-button" type="button" aria-label="Open settings" title="Settings">&#9881;</button>
                </div>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
              </table>
            </div>
          </div>
        </section>
      </section>
    </main>

    <dialog id="settings-dialog" class="settings-dialog">
      <div class="settings-card">
        <div class="dialog-head">
          <div>
            <p class="panel-kicker">Settings</p>
            <h2>Lead Studio Diagnostics</h2>
          </div>
          <button id="close-settings-button" class="icon-button close-icon-button" type="button" aria-label="Close settings">&times;</button>
        </div>

        <div class="settings-grid">
          <section class="settings-section">
            <p class="panel-kicker">Mailbox</p>
            <p id="mailbox-user" class="status-text">Loading...</p>
          </section>

          <section class="settings-section">
            <p class="panel-kicker">Setup</p>
            <div id="property-status" class="property-list"></div>
          </section>

          <section class="settings-section">
            <p class="panel-kicker">Operations</p>
            <div id="operations-status" class="property-list"></div>
            <button id="operations-refresh-button" class="ghost-button" type="button">Refresh Operations Status</button>
          </section>

          <section class="settings-section settings-actions">
            <p class="panel-kicker">Diagnostics</p>
            <button id="gmail-access-button" class="ghost-button" type="button">Test Gmail Access</button>
            <button id="gmail-test-button" class="ghost-button" type="button">Test New Contact Mail</button>
            <button id="service-account-button" class="ghost-button" type="button">Show Service Account</button>
            <button id="smoke-tests-button" class="ghost-button" type="button">Run Smoke Tests</button>
            <button id="deep-scan-button" class="ghost-button" type="button">Deep Scan Marketing Inbox</button>
            <button id="jira-refresh-all-button" class="ghost-button" type="button">Deep Refresh Jira Matches</button>
            <button id="jira-check-button" class="ghost-button" type="button">Check Jira Auth</button>
          </section>

          <section class="settings-section settings-output">
            <p class="panel-kicker">Diagnostics Status</p>
            <pre id="gmail-test-output" class="test-output">No test run yet.</pre>
          </section>
        </div>
      </div>
    </dialog>

    <dialog id="lead-detail-dialog" class="lead-detail-dialog">
      <div class="lead-detail-card">
        <div class="dialog-head">
          <div>
            <p class="panel-kicker">Lead Details</p>
            <h2 id="lead-detail-title">Lead</h2>
          </div>
          <button id="close-lead-detail-button" class="icon-button close-icon-button" type="button" aria-label="Close lead details">&times;</button>
        </div>
        <div id="lead-detail-body" class="lead-detail-body"></div>
      </div>
    </dialog>

    <?!= include('Script'); ?>
  </body>
</html>
