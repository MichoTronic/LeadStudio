<style>
  :root {
    --bg: #0f172a;
    --sidebar-border: rgba(148, 163, 184, 0.12);
    --panel: #162238;
    --line: rgba(148, 163, 184, 0.12);
    --text: #f8fafc;
    --muted: #90a2c5;
    --accent: #3b9cff;
    --accent-strong: #5b9cff;
    --success: #22c55e;
    --danger: #f87171;
    --shadow: 0 18px 40px rgba(3, 7, 18, 0.35);
    --radius-xl: 18px;
    --radius-md: 10px;
    --font-ui: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background:
      radial-gradient(circle at top left, rgba(59, 130, 246, 0.08), transparent 28%),
      radial-gradient(circle at 85% 10%, rgba(139, 92, 246, 0.08), transparent 20%),
      linear-gradient(180deg, #0f172a, #0b1223);
    color: var(--text);
    font-family: var(--font-ui);
  }

  body {
    min-height: 100vh;
    overflow-x: hidden;
  }

  .aurora {
    position: fixed;
    border-radius: 999px;
    filter: blur(70px);
    opacity: 0.4;
    pointer-events: none;
  }

  .aurora-one {
    width: 280px;
    height: 280px;
    background: rgba(59, 130, 246, 0.12);
    top: 40px;
    right: 6vw;
  }

  .aurora-two {
    width: 240px;
    height: 240px;
    background: rgba(139, 92, 246, 0.08);
    left: 6vw;
    bottom: 20px;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: rgba(15, 23, 42, 0.9);
    border-bottom: 1px solid var(--sidebar-border);
    backdrop-filter: blur(18px);
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-mark {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(91, 156, 255, 0.35));
    color: #dbeafe;
    font-weight: 800;
    letter-spacing: 0.08em;
  }

  .brand-copy {
    display: grid;
    gap: 2px;
  }

  .brand-overline,
  .panel-kicker {
    margin: 0 0 10px;
    color: #82b4ff;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .brand-title {
    margin: 0;
    font-size: 1.08rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .topbar-user {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 12px;
    background: rgba(22, 34, 56, 0.94);
    border: 1px solid var(--line);
  }

  .user-label {
    color: var(--muted);
    font-size: 0.8rem;
  }

  .user-value {
    font-size: 0.9rem;
    font-weight: 600;
  }

  .shell {
    position: relative;
    z-index: 1;
    padding: 18px;
  }

  .workspace {
    display: grid;
    grid-template-columns: 230px minmax(0, 1fr);
    gap: 18px;
    min-width: 0;
  }

  .rail,
  .main-panel {
    display: grid;
    gap: 18px;
    align-content: start;
    min-width: 0;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
    padding: 18px;
    min-width: 0;
  }

  .panel-note,
  .status-text {
    margin: 0 0 14px;
    color: var(--muted);
    line-height: 1.45;
    font-size: 0.9rem;
  }

  .status-text {
    margin-bottom: 0;
  }

  .status-text.is-error {
    color: var(--danger);
  }

  .status-text.is-success {
    color: #4ade80;
  }

  .test-output {
    min-height: 120px;
    max-height: 280px;
    overflow: auto;
    margin: 0;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: rgba(15, 23, 42, 0.72);
    color: #dce5f7;
    font: 12px/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .primary-button,
  .ghost-button {
    width: 100%;
    appearance: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    font: inherit;
    transition: background 150ms ease, border-color 150ms ease, transform 150ms ease, box-shadow 150ms ease;
  }

  .primary-button {
    border: 1px solid rgba(91, 156, 255, 0.35);
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    color: #ffffff;
    padding: 13px 16px;
    font-weight: 700;
    box-shadow: 0 12px 24px rgba(59, 130, 246, 0.2);
  }

  .ghost-button {
    margin-top: 10px;
    border: 1px solid var(--line);
    background: rgba(22, 34, 56, 0.98);
    color: var(--text);
    padding: 12px 14px;
  }

  .property-list {
    display: grid;
    gap: 10px;
  }

  .property-item {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    color: var(--muted);
    font-size: 0.84rem;
  }

  .property-item strong {
    text-align: right;
    overflow-wrap: anywhere;
  }

  .is-ok {
    color: var(--success);
  }

  .is-bad {
    color: var(--danger);
  }

  .table-panel {
    overflow: hidden;
  }

  .table-toolbar {
    display: grid;
    grid-template-columns: minmax(560px, max-content) minmax(420px, 1fr);
    gap: 12px 18px;
    align-items: start;
    margin-bottom: 12px;
  }

  .toolbar-controls {
    display: grid;
    gap: 10px;
    justify-items: end;
    min-width: 0;
  }

  .toolbar-filter-row,
  .toolbar-utility-row {
    display: grid;
    gap: 10px;
    justify-content: end;
    align-items: start;
    width: 100%;
  }

  .toolbar-filter-row {
    grid-template-columns: 96px 150px 155px 150px;
  }

  .toolbar-utility-row {
    grid-template-columns: minmax(260px, 320px) 106px 44px;
  }

  .toolbar-actions {
    display: grid;
    gap: 10px;
    align-items: start;
    min-width: 0;
  }

  .metric-row {
    display: grid;
    grid-template-columns: 96px 110px 130px 78px 104px 122px;
    gap: 10px;
    align-items: start;
  }

  .date-filter-row {
    display: grid;
    grid-template-columns: 96px 110px minmax(348px, 1fr);
    gap: 10px;
    align-items: start;
  }

  .rows-inline {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    width: 100%;
    min-height: 44px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: rgba(15, 23, 42, 0.72);
  }

  .metric-button {
    appearance: none;
    color: inherit;
    font: inherit;
    cursor: pointer;
    transition: border-color 150ms ease, background 150ms ease, box-shadow 150ms ease, transform 150ms ease;
  }

  .metric-button:hover,
  .metric-button.is-active {
    transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(3, 7, 18, 0.24);
  }

  .metric-button.is-active {
    outline: 2px solid rgba(219, 234, 254, 0.28);
    outline-offset: 2px;
  }

  .rows-inline-label {
    color: var(--muted);
    font-size: 0.82rem;
  }

  .rows-inline-value {
    color: var(--text);
    font-size: 0.95rem;
  }

  .metric-inline {
    min-height: 44px;
  }

  .metric-new-lead {
    border-color: rgba(226, 232, 240, 0.24);
    background: rgba(226, 232, 240, 0.06);
  }

  .metric-new-lead .rows-inline-value {
    color: #e2e8f0;
  }

  .metric-qualified {
    border-color: rgba(251, 146, 60, 0.35);
    background: rgba(251, 146, 60, 0.08);
  }

  .metric-qualified .rows-inline-value {
    color: #fb923c;
  }

  .metric-active {
    border-color: rgba(34, 197, 94, 0.35);
    background: rgba(34, 197, 94, 0.08);
  }

  .metric-active .rows-inline-value {
    color: #4ade80;
  }

  .metric-inactive {
    border-color: rgba(248, 113, 113, 0.35);
    background: rgba(248, 113, 113, 0.08);
  }

  .metric-inactive .rows-inline-value {
    color: #f87171;
  }

  .metric-onboarding {
    border-color: rgba(96, 165, 250, 0.35);
    background: rgba(96, 165, 250, 0.08);
  }

  .metric-onboarding .rows-inline-value {
    color: #93c5fd;
  }

  .date-filter-button,
  .date-input {
    min-height: 38px;
    border: 1px solid rgba(148, 163, 184, 0.16);
    border-radius: 10px;
    background: rgba(15, 23, 42, 0.8);
    color: #dce5f7;
    font: inherit;
    font-size: 0.82rem;
  }

  .date-filter-button {
    width: 100%;
    cursor: pointer;
    white-space: nowrap;
  }

  .date-filter-button:hover,
  .date-filter-button.is-active {
    border-color: rgba(147, 197, 253, 0.45);
    background: rgba(59, 130, 246, 0.14);
  }

  .date-filter-button.is-active {
    color: #dbeafe;
    box-shadow: inset 0 0 0 1px rgba(91, 156, 255, 0.18);
  }

  .date-custom-group {
    display: grid;
    grid-template-columns: 68px 132px 132px;
    gap: 8px;
    align-items: center;
    min-height: 38px;
  }

  .date-custom-label {
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .date-input {
    width: 132px;
    padding: 0 10px;
    color-scheme: dark;
  }

  .date-input.is-active {
    border-color: rgba(147, 197, 253, 0.45);
    background: rgba(59, 130, 246, 0.14);
  }

  .filter-menu {
    position: relative;
    width: 150px;
  }

  .export-menu {
    position: relative;
    width: 106px;
  }

  .filter-menu-compact {
    width: 155px;
  }

  .clear-filters-button {
    width: 96px;
    min-height: 44px;
    border: 1px solid rgba(148, 163, 184, 0.16);
    border-radius: 10px;
    background: rgba(22, 34, 56, 0.98);
    color: #dce5f7;
    cursor: pointer;
    font: inherit;
    font-size: 0.82rem;
    white-space: nowrap;
  }

  .clear-filters-button:hover {
    border-color: rgba(147, 197, 253, 0.45);
    background: rgba(30, 41, 59, 0.98);
  }

  .filter-menu summary,
  .export-menu summary {
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 0 12px;
    border: 1px solid rgba(148, 163, 184, 0.16);
    border-radius: 10px;
    background: rgba(15, 23, 42, 0.8);
    color: #dce5f7;
    cursor: pointer;
    list-style: none;
    font-size: 0.9rem;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .filter-menu summary::-webkit-details-marker,
  .export-menu summary::-webkit-details-marker {
    display: none;
  }

  .filter-menu summary::after {
    content: "▾";
    color: var(--muted);
    font-size: 0.78rem;
  }

  .filter-menu[open] summary::after {
    content: "▴";
  }

  .filter-options {
    position: absolute;
    right: 0;
    z-index: 40;
    display: grid;
    gap: 4px;
    width: max-content;
    min-width: 220px;
    max-height: 260px;
    overflow: auto;
    margin-top: 8px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #111c31;
    box-shadow: var(--shadow);
  }

  .export-options {
    position: absolute;
    right: 0;
    z-index: 40;
    display: grid;
    gap: 8px;
    width: 180px;
    margin-top: 8px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #111c31;
    box-shadow: var(--shadow);
  }

  .export-menu summary::after {
    content: "v";
    color: var(--muted);
    font-size: 0.78rem;
  }

  .export-menu[open] summary::after {
    content: "^";
  }

  .export-option-button {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(22, 34, 56, 0.98);
    color: var(--text);
    padding: 10px 12px;
    text-align: left;
  }

  .export-option-button:hover {
    border-color: rgba(147, 197, 253, 0.45);
    background: rgba(30, 41, 59, 0.98);
  }

  .filter-option {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px;
    border-radius: 8px;
    color: #dce5f7;
    font-size: 0.88rem;
    cursor: pointer;
    white-space: nowrap;
  }

  .filter-option:hover {
    background: rgba(59, 130, 246, 0.12);
  }

  .filter-option input {
    accent-color: var(--accent);
  }

  .search-input {
    width: 100%;
    border: 1px solid rgba(148, 163, 184, 0.16);
    background: rgba(15, 23, 42, 0.8);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font: inherit;
  }

  .search-input::placeholder {
    color: #7184aa;
  }

  .search-input-large {
    max-width: none;
  }

  .icon-button {
    width: 44px;
    height: 44px;
    flex: 0 0 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: rgba(22, 34, 56, 0.98);
    color: var(--text);
    cursor: pointer;
    font: inherit;
    font-size: 1.2rem;
    line-height: 1;
  }

  .sort-button {
    appearance: none;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 7px 10px;
    background: transparent;
    color: inherit;
    font: inherit;
    font-weight: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    cursor: pointer;
  }

  .sort-button:hover,
  .sort-button.is-active {
    border-color: rgba(91, 156, 255, 0.45);
    background: rgba(59, 130, 246, 0.14);
    color: #dbeafe;
  }

  .sort-button.is-active {
    box-shadow: inset 0 0 0 1px rgba(91, 156, 255, 0.18);
  }

  .filter-menu summary::after {
    content: "v";
  }

  .filter-menu[open] summary::after {
    content: "^";
  }

  .settings-dialog,
  .lead-detail-dialog {
    width: min(860px, calc(100vw - 24px));
    border: 0;
    padding: 0;
    border-radius: 20px;
    background: transparent;
  }

  .lead-detail-dialog {
    width: min(980px, calc(100vw - 24px));
  }

  .settings-dialog::backdrop,
  .lead-detail-dialog::backdrop {
    background: rgba(2, 6, 23, 0.68);
    backdrop-filter: blur(8px);
  }

  .settings-card,
  .lead-detail-card {
    padding: 22px;
    border-radius: 20px;
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    color: var(--text);
    max-height: calc(100vh - 48px);
    overflow: auto;
  }

  .lead-detail-body {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }

  .detail-section {
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: rgba(15, 23, 42, 0.35);
    min-width: 0;
  }

  .detail-section h3 {
    margin: 0 0 12px;
    color: #dbeafe;
    font-size: 0.95rem;
  }

  .detail-section dl {
    display: grid;
    grid-template-columns: minmax(100px, 0.42fr) minmax(0, 1fr);
    gap: 9px 12px;
    margin: 0;
  }

  .detail-section dt {
    color: var(--muted);
    font-size: 0.78rem;
  }

  .detail-section dd {
    margin: 0;
    color: #dce5f7;
    font-size: 0.86rem;
    overflow-wrap: anywhere;
  }

  .detail-text-section {
    grid-column: 1 / -1;
  }

  .jira-edit-section {
    grid-column: 1 / -1;
  }

  .jira-edit-form {
    display: grid;
    gap: 12px;
  }

  .jira-edit-form label {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-size: 0.78rem;
  }

  .detail-input {
    width: 100%;
    border: 1px solid rgba(148, 163, 184, 0.16);
    background: rgba(15, 23, 42, 0.8);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font: inherit;
  }

  .detail-save-button {
    width: auto;
    min-width: 150px;
    margin-top: 0;
  }

  .jira-current-link {
    margin: 0;
    color: #dce5f7;
  }

  .jira-link {
    color: #93c5fd;
    font-weight: 700;
    text-decoration: none;
  }

  .jira-link:hover {
    color: #bfdbfe;
    text-decoration: underline;
  }

  .detail-text-section p {
    margin: 0;
    color: #dce5f7;
    line-height: 1.55;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .dialog-head {
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
  }

  .dialog-head h2 {
    margin: 0;
    color: #eef6ff;
    font-size: 1.35rem;
    line-height: 1.1;
  }

  .close-icon-button {
    font-size: 1.6rem;
  }

  .settings-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .settings-section {
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: rgba(15, 23, 42, 0.35);
  }

  .settings-actions,
  .settings-output {
    grid-column: 1 / -1;
  }

  .settings-actions .ghost-button {
    width: auto;
    min-width: 180px;
    margin: 0 10px 10px 0;
  }

  .table-wrap {
    width: 100%;
    min-width: 0;
    overflow: auto;
    max-height: 68vh;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: rgba(15, 23, 42, 0.35);
  }

  table {
    width: 100%;
    min-width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  th,
  td {
    text-align: left;
    padding: 12px 10px;
    border-bottom: 1px solid rgba(148, 163, 184, 0.08);
    vertical-align: top;
    font-size: 0.86rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: rgba(15, 23, 42, 0.98);
    color: var(--muted);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    line-height: 1.15;
  }

  td {
    color: #dce5f7;
  }

  tbody tr:hover {
    background: rgba(59, 130, 246, 0.06);
  }

  .lead-row {
    cursor: pointer;
  }

  .lead-row-qualified {
    box-shadow: inset 3px 0 0 rgba(251, 146, 60, 0.95);
  }

  .lead-row-active {
    box-shadow: inset 3px 0 0 rgba(34, 197, 94, 0.95);
  }

  .lead-row-inactive {
    box-shadow: inset 3px 0 0 rgba(248, 113, 113, 0.95);
  }

  .lead-row:focus {
    outline: 2px solid rgba(91, 156, 255, 0.78);
    outline-offset: -2px;
  }

  @media (max-width: 980px) {
    .workspace {
      grid-template-columns: 1fr;
    }

    .lead-detail-body {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 720px) {
    .topbar {
      height: auto;
      padding: 12px 14px;
      align-items: start;
      gap: 12px;
      flex-direction: column;
    }

    .shell {
      padding: 14px;
    }

    .panel {
      padding: 16px;
    }

    .table-toolbar,
    .toolbar-actions,
    .metric-row,
    .toolbar-filter-row,
    .toolbar-utility-row,
    .date-filter-row,
    .date-custom-group {
      grid-template-columns: 1fr;
    }

    .toolbar-controls {
      justify-content: stretch;
      justify-items: stretch;
      min-width: 0;
    }

    .filter-menu,
    .filter-menu-compact,
    .export-menu,
    .clear-filters-button,
    .date-input {
      width: 100%;
    }

    .search-input-large {
      max-width: none;
    }

    .settings-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
